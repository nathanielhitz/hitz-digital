<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Moderne redesign">
  <defs>
    <radialGradient id="a-glow" cx="0.82" cy="0.08" r="0.7">
      <stop offset="0" stop-color="#e2613c" stop-opacity="0.26"/>
      <stop offset="0.62" stop-color="#e2613c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="a-img" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6c533a"/>
      <stop offset="0.55" stop-color="#3a2c1f"/>
      <stop offset="1" stop-color="#211811"/>
    </linearGradient>
    <radialGradient id="a-imglight" cx="0.7" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#f6d7af" stop-opacity="0.34"/>
      <stop offset="0.6" stop-color="#f6d7af" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="a-imgclip"><rect x="690" y="150" width="446" height="402" rx="18"/></clipPath>
  </defs>

  <rect width="1200" height="760" fill="#14110e"/>
  <rect width="1200" height="760" fill="url(#a-glow)"/>

  <!-- nav -->
  <text x="64" y="76" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f4efe7">Jansen &amp; Zn<tspan fill="#e2613c">.</tspan></text>
  <g font-family="Inter, system-ui, sans-serif" font-size="15" fill="#9c9489">
    <text x="772" y="73">Werk</text>
    <text x="842" y="73">Diensten</text>
    <text x="938" y="73">Over</text>
  </g>
  <rect x="1024" y="52" width="112" height="38" rx="19" fill="none" stroke="#3a352e" stroke-width="1.5"/>
  <text x="1080" y="76" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f4efe7" text-anchor="middle">Offerte</text>

  <!-- hero text -->
  <text x="64" y="228" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#f4824e">VAKMANSCHAP SINDS 1994</text>
  <text x="60" y="300" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="600" letter-spacing="-2" fill="#f4efe7">Bouwen met <tspan fill="#e2613c">precisie</tspan>.</text>
  <text x="64" y="346" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#9c9489">Verbouw, onderhoud en nieuwbouw in Noord-Nederland.</text>
  <rect x="64" y="378" width="196" height="50" rx="25" fill="#e2613c"/>
  <text x="162" y="410" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Bekijk projecten</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6e665c">
    <text x="64" y="486">200+ projecten</text>
    <text x="210" y="486" fill="#3a352e">|</text>
    <text x="230" y="486">30 jaar ervaring</text>
  </g>

  <!-- hero image -->
  <g clip-path="url(#a-imgclip)">
    <rect x="690" y="150" width="446" height="402" fill="url(#a-img)"/>
    <rect x="690" y="150" width="446" height="402" fill="url(#a-imglight)"/>
    <rect x="760" y="360" width="320" height="150" rx="10" fill="#241a12" opacity="0.6"/>
    <rect x="760" y="360" width="320" height="4" fill="#7a5d3e" opacity="0.6"/>
  </g>
  <rect x="690" y="150" width="446" height="402" rx="18" fill="none" stroke="#2a2520"/>
</svg>
