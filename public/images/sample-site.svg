<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Premium website-preview">
  <defs>
    <linearGradient id="s-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#795b3c"/>
      <stop offset="0.5" stop-color="#3f2f1e"/>
      <stop offset="1" stop-color="#221910"/>
    </linearGradient>
    <radialGradient id="s-light" cx="0.7" cy="0.16" r="0.72">
      <stop offset="0" stop-color="#f8dfb8" stop-opacity="0.42"/>
      <stop offset="0.6" stop-color="#f8dfb8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s-beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbeacb" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#fbeacb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s-scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.4" stop-color="#120c08" stop-opacity="0"/>
      <stop offset="1" stop-color="#120c08" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="s-obj" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#604a32"/>
      <stop offset="1" stop-color="#2a1f14"/>
    </linearGradient>
    <radialGradient id="s-vign" cx="0.5" cy="0.42" r="0.78">
      <stop offset="0.55" stop-color="#100b07" stop-opacity="0"/>
      <stop offset="1" stop-color="#100b07" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8a6a45"/><stop offset="1" stop-color="#463625"/></linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#70716f"/><stop offset="1" stop-color="#3a3b3a"/></linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9a7a52"/><stop offset="1" stop-color="#564330"/></linearGradient>
    <clipPath id="feat-clip"><rect x="72" y="104" width="1056" height="448" rx="20"/></clipPath>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
  </defs>

  <rect width="1200" height="760" fill="#f7f3ec"/>

  <!-- nav -->
  <text x="72" y="74" font-family="Inter, system-ui, sans-serif" font-size="23" font-weight="700" fill="#1c1a17">Atelier Noord<tspan fill="#c2613c">.</tspan></text>
  <g font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6e685e">
    <text x="800" y="71">Werk</text>
    <text x="872" y="71">Atelier</text>
    <text x="962" y="71">Contact</text>
  </g>
  <rect x="1040" y="50" width="88" height="36" rx="18" fill="#1c1a17"/>
  <text x="1084" y="73" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Offerte</text>

  <!-- feature "photo" -->
  <g clip-path="url(#feat-clip)">
    <rect x="72" y="104" width="1056" height="448" fill="url(#s-base)"/>
    <ellipse cx="560" cy="280" rx="540" ry="300" fill="url(#s-light)"/>
    <polygon points="700,104 880,104 760,552 600,552" fill="url(#s-beam)"/>
    <!-- low cabinet -->
    <rect x="628" y="336" width="520" height="190" rx="16" fill="url(#s-obj)"/>
    <rect x="628" y="336" width="520" height="4" rx="2" fill="#876848" opacity="0.7"/>
    <line x1="888" y1="340" x2="888" y2="520" stroke="#1f1610" stroke-width="2" opacity="0.5"/>
    <ellipse cx="888" cy="524" rx="250" ry="14" fill="#0e0a06" opacity="0.35"/>
    <!-- plant -->
    <polygon points="178,506 222,506 214,540 186,540" fill="#2c2418"/>
    <path d="M200 506 C188 470 176 452 168 440 M200 506 C212 472 226 456 236 446 M200 506 C200 466 200 446 200 430" stroke="#3c3c2a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <rect x="72" y="104" width="1056" height="448" filter="url(#grain)" opacity="0.05"/>
    <rect x="72" y="104" width="1056" height="448" fill="url(#s-vign)"/>
    <rect x="72" y="104" width="1056" height="448" fill="url(#s-scrim)"/>
  </g>

  <!-- overlaid editorial text -->
  <text x="112" y="392" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#f3e9da" fill-opacity="0.82">INTERIEUR &amp; MEUBELMAKERIJ</text>
  <text x="109" y="452" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" letter-spacing="-1.4" fill="#ffffff">Ruimtes met karakter.</text>
  <text x="112" y="489" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#ffffff" fill-opacity="0.84">Handgemaakte interieurs voor mensen met smaak.</text>
  <rect x="112" y="507" width="186" height="44" rx="22" fill="#ffffff"/>
  <text x="205" y="535" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#1c1a17" text-anchor="middle">Bekijk projecten</text>

  <!-- selected work strip -->
  <text x="72" y="588" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="2" fill="#9a9489">GESELECTEERD WERK</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">
    <rect x="72" y="602" width="341" height="122" rx="14" fill="url(#t1)"/>
    <text x="94" y="706">Keuken op maat</text>
    <rect x="429" y="602" width="341" height="122" rx="14" fill="url(#t2)"/>
    <text x="451" y="706">Wandkast</text>
    <rect x="786" y="602" width="342" height="122" rx="14" fill="url(#t3)"/>
    <text x="808" y="706">Eettafel</text>
  </g>
</svg>
